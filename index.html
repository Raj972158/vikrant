<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
background:linear-gradient(130deg,#2b0000,#550000,#900000);
background-size:300% 300%;
animation:bgMove 10s infinite alternate;
color:white;
}

@keyframes bgMove{
0%{background-position:0% 50%;}
100%{background-position:100% 50%;}
}

/* particles */

canvas{
position:fixed;
top:0;
left:0;
z-index:0;
}

/* card */

.wrapper{
position:relative;
z-index:2;
text-align:center;
}

.card{
width:340px;
padding:40px 30px;
border-radius:20px;
background:rgba(255,255,255,0.08);
backdrop-filter:blur(20px);
border:1px solid rgba(255,255,255,0.2);
box-shadow:0 20px 60px rgba(0,0,0,0.6);
}

.profile{
width:110px;
height:110px;
border-radius:50%;
object-fit:cover;
border:4px solid white;
margin-bottom:15px;
}

h2{
margin-bottom:10px;
}

.text{
font-size:14px;
line-height:1.6;
opacity:0.9;
margin-bottom:25px;
}

/* button */

.btn{
display:inline-flex;
align-items:center;
gap:10px;
padding:15px 30px;
border-radius:50px;
background:linear-gradient(45deg,#00c6ff,#0072ff);
color:white;
text-decoration:none;
font-weight:bold;
font-size:16px;
transition:.3s;
position:relative;
}

.btn:hover{
transform:scale(1.1);
box-shadow:0 0 25px #00c6ff;
}

/* floating bubbles */

.btn::before,
.btn::after{
content:"";
position:absolute;
width:10px;
height:10px;
background:#00c6ff;
border-radius:50%;
top:-15px;
animation:bubble 3s infinite;
}

.btn::after{
left:80%;
animation-delay:1s;
}

.btn::before{
left:20%;
}

@keyframes bubble{
0%{transform:translateY(0);opacity:1}
100%{transform:translateY(-40px);opacity:0}
}

/* countdown */

.timer{
margin-top:15px;
font-size:13px;
opacity:0.8;
}

/* disclaimer */

.disclaimer{
margin-top:20px;
font-size:11px;
opacity:0.6;
}

.ads{
margin-top:6px;
font-size:12px;
}

.ads a{
color:#00c6ff;
font-weight:bold;
text-decoration:none;
}

<script>

/* countdown */

let time=30;
let counter=document.getElementById("count");

setInterval(()=>{
time--;
counter.innerText=time;
if(time<=0){
window.location.href="https://t.me/+Un47Lu9mRckwZDY1";
}
},1000);

/* particles */

const canvas=document.getElementById("particles");
const ctx=canvas.getContext("2d");

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let particles=[];

for(let i=0;i<80;i++){
particles.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
r:Math.random()*2+1,
d:Math.random()*80
});
}

function draw(){
ctx.clearRect(0,0,canvas.width,canvas.height);

ctx.fillStyle="rgba(255,255,255,0.4)";

particles.forEach(p=>{
ctx.beginPath();
ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
ctx.fill();
});

update();
}

function update(){
particles.forEach(p=>{
p.y+=0.5;

if(p.y>canvas.height){
p.y=0;
p.x=Math.random()*canvas.width;
}
});
}

setInterval(draw,33);

</script>
